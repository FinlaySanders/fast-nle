name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake bison flex libbz2-dev

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: Build engine + data
        run: cmake --build build --target nethack dat -j "$(nproc)"

      # Oracle (a), strict form: every writable symbol in the library must
      # be in tools/global_whitelist.txt with a justification. The migration
      # is complete; any new global fails CI.
      - name: Check no mutable globals (strict)
        run: tools/check_no_globals.sh build/libnethack.so

      # Oracle (b): golden trajectories recorded from stock NLE must replay
      # bit-identically. Any engine change that alters game behavior fails
      # here. See docs/DESIGN.md.
      - name: Build replay harnesses
        run: |
          cc -O2 -Iinclude -Ibuild/_deps/deboost_context-src/include \
             tests/replay_golden.c -ldl -o build/replay_golden
          cc -O2 -Iinclude -Ibuild/_deps/deboost_context-src/include \
             tests/replay_multi.c -ldl -lpthread -o build/replay_multi

      - name: Replay golden trajectories (sequential, one lib image)
        run: build/replay_golden build/libnethack.so build/dat tests/goldens/*.golden

      # Two envs live simultaneously in ONE library image, stepped
      # alternately — catches cross-env state leakage.
      - name: Replay goldens (interleaved pairs)
        run: build/replay_multi --interleaved build/libnethack.so build/dat tests/goldens/*.golden

      # Every nle_* call executes on a rotating pool thread — catches state
      # stashed in thread-locals other than the two sanctioned ctx pointers.
      - name: Replay goldens (thread-shuffled)
        run: build/replay_multi --shuffled build/libnethack.so build/dat tests/goldens/*.golden

      # Oracle (e): the "!status_updates" RL perf mode swaps the blstats
      # obs source from the status pipeline to nle_rl_bot_direct (winrl.cc,
      # pumped from bot()/timebot() in botl.c). Every obs byte must still
      # match the stock-recorded hashes — including staleness timing (e.g.
      # energy regen between the last bot() and the observation point).
      - name: Replay goldens (!status_updates blstats parity)
        run: |
          NLE_REPLAY_OPTIONS_APPEND=",!status_updates" \
            build/replay_golden build/libnethack.so build/dat \
            tests/goldens/*.golden

      # Oracle (d): the game must be identical at any optimization level.
      # C leaves call-argument evaluation order unspecified; gcc -O3 once
      # reordered RNG-drawing arguments (mklev.c gold placement etc.),
      # generating different dungeons than -O2/clang. Those sites are now
      # explicitly sequenced; this gate keeps new ones out.
      - name: Replay goldens (gcc -O3 build must match)
        run: |
          cmake -S . -B build_o3 -DCMAKE_BUILD_TYPE=Release
          cmake --build build_o3 --target nethack -j "$(nproc)"
          build/replay_golden build_o3/libnethack.so build/dat \
            tests/goldens/*.golden

      # Oracle (c): seeded games must be independent of wall-clock time.
      # Stock NetHack leaks time(0) into gameplay via ubirthday (shopkeeper
      # names, used-item price parity, scroll labels); fast-nle derives
      # ubirthday from time_seed instead (nle_birthday_maybe_fixed). Replay
      # a shop-reaching golden under two wildly different interposed clocks:
      # if a wall-clock leak is ever (re)introduced, one of them fails.
      - name: Replay is wall-clock independent
        run: |
          cc -O2 -shared -fPIC tools/faketime_shim.c -o build/faketime_shim.so
          for t in 123456789 2000000000; do
            LD_PRELOAD=$PWD/build/faketime_shim.so NLE_FAKE_TIME=$t \
              build/replay_golden build/libnethack.so build/dat \
              tests/goldens/*.golden
          done
