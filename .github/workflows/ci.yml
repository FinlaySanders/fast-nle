name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake bison flex libbz2-dev

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: Build engine + data
        run: cmake --build build --target nethack dat -j "$(nproc)"

      # Oracle (a), strict form: every writable symbol in the library must
      # be in tools/global_whitelist.txt with a justification. The migration
      # is complete; any new global fails CI.
      - name: Check no mutable globals (strict)
        run: tools/check_no_globals.sh build/libnethack.so

      # Oracle (b): golden trajectories recorded from stock NLE must replay
      # bit-identically. Any engine change that alters game behavior fails
      # here. See docs/DESIGN.md.
      - name: Build replay harnesses
        run: |
          cc -O2 -Iinclude -Ibuild/_deps/deboost_context-src/include \
             tests/replay_golden.c -ldl -o build/replay_golden
          cc -O2 -Iinclude -Ibuild/_deps/deboost_context-src/include \
             tests/replay_multi.c -ldl -lpthread -o build/replay_multi

      - name: Replay golden trajectories (sequential, one lib image)
        run: build/replay_golden build/libnethack.so build/dat tests/goldens/*.golden

      # Two envs live simultaneously in ONE library image, stepped
      # alternately — catches cross-env state leakage.
      - name: Replay goldens (interleaved pairs)
        run: build/replay_multi --interleaved build/libnethack.so build/dat tests/goldens/*.golden

      # Every nle_* call executes on a rotating pool thread — catches state
      # stashed in thread-locals other than the two sanctioned ctx pointers.
      - name: Replay goldens (thread-shuffled)
        run: build/replay_multi --shuffled build/libnethack.so build/dat tests/goldens/*.golden
