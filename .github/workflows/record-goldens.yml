name: record-goldens
# Record deep AutoAscend golden trajectories from STOCK NLE on Linux — the
# target platform. Recording on Linux (with time(2) pinned by the recorder,
# see tools/record_autoascend.py) makes goldens platform-canonical: the
# fast-nle engine takes the UNIX code paths on every platform (see the
# MACOSX note in src/eat.c), so mac dev builds replay these bit-exactly.
# Manually triggered; download the artifacts and commit them to
# tests/goldens/.
on:
  push:
    branches: [msan-hunt]
    paths: [.github/workflows/record-goldens.yml]

jobs:
  record:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y cmake bison flex libbz2-dev

      - name: Install stock NLE (import commit) + AutoAscend deps
        run: |
          pip install "numpy<2" scipy numba opencv-python-headless toolz \
            pandas matplotlib nltk pillow seaborn gymnasium
          # clang: stock must evaluate rng-drawing call arguments in the
          # canonical order (the one our sequenced engine encodes). gcc -O3
          # reorders them; clang matches at every opt level we tested.
          CC=clang CXX=clang++ \
            pip install "git+https://github.com/${GITHUB_REPOSITORY}.git@2319f298"

      - name: Clone AutoAscend + BLStats align patch
        run: |
          git clone --depth 1 https://github.com/maciej-sypetkowski/autoascend /tmp/autoascend
          sed -i "s/level_number prop_mask')/level_number prop_mask align')/" \
            /tmp/autoascend/autoascend/agent.py

      - name: Record
        run: |
          mkdir -p /tmp/goldens
          python -P tools/record_autoascend.py \
            --autoascend /tmp/autoascend --outdir /tmp/goldens \
            --seeds 7010,7014,7015 --max-steps 100000
          ls -la /tmp/goldens

      - uses: actions/upload-artifact@v4
        with:
          name: goldens
          path: /tmp/goldens/

      - name: Dump stock init frame (seed 7014)
        run: |
          cd /tmp && python - <<'PYEOF'
          import numpy as np
          from nle.nethack import Nethack
          import os
          os.environ["NLE_FAKE_TIME"] = str(1600000000 + (7015 % 100000) * 257)
          F=0xCBF29CE484222325; P=0x100000001B3; M=(1<<64)-1
          def fnv(b,h=F):
              for x in b: h=((h^x)*P)&M
              return h
          opts = "autopickup,color,disclose:+i +a +v +g +c +o,mention_walls,nobones,nocmdassist,nolegacy,nosparkle,pickup_burden:unencumbered,pickup_types:$?!/,runmode:teleport,showexp,showscore,time,race:random,gender:random,align:random"
          KEYS=("glyphs","chars","colors","specials","blstats","message")
          g = Nethack(observation_keys=KEYS+("misc",), playername="Agent-@",
                      options=opts.split(","), ttyrec=None, fix_moon_phase=True)
          g.set_initial_seeds(7014, 7014, False)
          obs = g.reset()
          h=F
          for k,a in zip(KEYS,obs[:6]):
              ah=fnv(np.ascontiguousarray(a).tobytes())
              h=fnv(np.ascontiguousarray(a).tobytes(),h)
              print(f"h.{k} {ah:016x}")
          print(f"combined {h:016x}")
          msg=bytes(obs[5]).split(b"\x00")[0].decode("latin1")
          print("message:", repr(msg))
          print("blstats:", " ".join(str(int(v)) for v in obs[4]))
          ch = obs[1]
          for r in range(ch.shape[0]):
              print("row", "".join(chr(c) if 32 <= c < 127 else "?" for c in ch[r]))
          g.close()
          PYEOF
