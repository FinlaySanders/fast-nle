name: record-goldens
# Record deep AutoAscend golden trajectories from STOCK NLE on Linux — the
# target platform. Recording on Linux (with time(2) pinned by the recorder,
# see tools/record_autoascend.py) makes goldens platform-canonical: the
# fast-nle engine takes the UNIX code paths on every platform (see the
# MACOSX note in src/eat.c), so mac dev builds replay these bit-exactly.
# Manually triggered; download the artifacts and commit them to
# tests/goldens/.
on:
  push:
    branches: [msan-hunt]
    paths: [.github/workflows/record-goldens.yml]

jobs:
  record:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y cmake bison flex libbz2-dev

      - name: Install stock NLE (import commit) + AutoAscend deps
        run: |
          pip install "numpy<2" scipy numba opencv-python-headless toolz \
            pandas matplotlib nltk pillow seaborn gymnasium
          pip install "git+https://github.com/${GITHUB_REPOSITORY}.git@2319f298"

      - name: Clone AutoAscend + BLStats align patch
        run: |
          git clone --depth 1 https://github.com/maciej-sypetkowski/autoascend /tmp/autoascend
          sed -i "s/level_number prop_mask')/level_number prop_mask align')/" \
            /tmp/autoascend/autoascend/agent.py

      - name: Record
        run: |
          mkdir -p /tmp/goldens
          python -P tools/record_autoascend.py \
            --autoascend /tmp/autoascend --outdir /tmp/goldens \
            --seeds 7010,7014,7015 --max-steps 100000
          ls -la /tmp/goldens

      - uses: actions/upload-artifact@v4
        with:
          name: goldens
          path: /tmp/goldens/
