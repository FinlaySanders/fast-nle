name: msan-hunt
on:
  push:
    branches: [msan-hunt]
  workflow_dispatch:

jobs:
  msan:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y clang bison flex

      - name: Configure (MemorySanitizer, origin tracking)
        run: |
          cmake -S . -B build \
            -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_C_FLAGS="-O1 -g -fsanitize=memory -fsanitize-memory-track-origins=2 -fsanitize-recover=memory -fno-omit-frame-pointer -fsanitize-ignorelist=$PWD/tools/msan_ignorelist.txt" \
            -DCMAKE_CXX_FLAGS="-O1 -g -fsanitize=memory -fsanitize-memory-track-origins=2 -fsanitize-recover=memory -fno-omit-frame-pointer -fsanitize-ignorelist=$PWD/tools/msan_ignorelist.txt" \
            -DCMAKE_SHARED_LINKER_FLAGS="-fsanitize=memory" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=memory"

      # build tools (makedefs/lev_comp) run during this step under MSan;
      # recover mode keeps them alive through their own reports
      - name: Build engine + data
        env:
          MSAN_OPTIONS: halt_on_error=0:exitcode=0
        run: cmake --build build --target nethack dat -j "$(nproc)"

      - name: Sanity - MSan instrumentation + strict gate on ELF
        run: |
          echo "msan symbols in lib: $(nm build/libnethack.so | grep -c __msan || true)"
          tools/check_no_globals.sh build/libnethack.so

      - name: Build replay harness
        run: |
          clang -O1 -g -fsanitize=memory -fsanitize-memory-track-origins=2 \
            -fsanitize-recover=memory -fno-omit-frame-pointer \
            -Iinclude -Ibuild/_deps/deboost_context-src/include \
            tests/replay_golden.c -ldl -o build/replay_golden

      - name: Replay deep golden under MSan
        env:
          MSAN_OPTIONS: halt_on_error=0:exitcode=0
        run: |
          # keep-going: Linux forks off the mac-recorded deep goldens early
          # (aa_7015 at step 5330), but MSan coverage doesn't need hash
          # agreement — step through ALL recorded actions of both deep games.
          NLE_REPLAY_KEEP_GOING=1 build/replay_golden build/libnethack.so \
            build/dat \
            tests/goldens/aa_seed7015_7015.golden \
            tests/msan/aa_seed7010_7010.golden \
            > /tmp/msan_replay.log 2>&1 || true
          build/replay_golden build/libnethack.so build/dat \
            tests/goldens/mon_seed1010_2021.golden \
            >> /tmp/msan_replay.log 2>&1 || true
          echo "=== replay result ==="
          grep -E "^OK|^KEEP-GOING|MISMATCH|transient" /tmp/msan_replay.log | tail -5
          echo "=== unique MSan reports: ==="
          grep -c "WARNING: MemorySanitizer" /tmp/msan_replay.log || true
          echo "=== first 12 reports with stacks ==="
          awk '/WARNING: MemorySanitizer/{n++} n<=12 && n>0' /tmp/msan_replay.log | head -400

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: msan-replay-log
          path: /tmp/msan_replay.log

  # Hypothesis probe: the residual hash flickers are ADDRESS-dependent, not
  # uninitialized (MSan certified every obs byte initialized while flickers
  # occurred). If a pointer value leaks into game state, per-process ASLR
  # makes flicker steps differ between two runs of the same binary, and
  # disabling ASLR (setarch -R) makes them identical.
  aslr-probe:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y clang bison flex
      - name: Build plain (no sanitizer)
        run: |
          cmake -S . -B build \
            -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo
          cmake --build build --target nethack dat -j "$(nproc)"
          clang -O2 -g -Iinclude \
            -Ibuild/_deps/deboost_context-src/include \
            tests/replay_golden.c -ldl -o build/replay_golden
      - name: Cross-platform check with seed-derived ubirthday
        run: |
          # Engine now derives ubirthday from time_seed, so mac and Linux
          # see IDENTICAL time inputs. Any remaining divergence from the
          # mac-recorded goldens is a genuine platform difference
          # (candidates: libc qsort tie order, etc.), not time.
          echo "--- FULL CORPUS vs Linux clang -O2 engine ---"
          build/replay_golden build/libnethack.so build/dat \
            tests/goldens/*.golden | tail -1
          echo "--- RNG trace of levelgen step 30918 (7015) ---"
          NLE_TRACE_AT_STEP=30918 NLE_REPLAY_KEEP_GOING=1 \
            build/replay_golden build/libnethack.so build/dat \
            tests/linuxgold/aa_seed7015_7015.golden \
            2> /tmp/trace_linux.txt > /dev/null || true
          grep -c RNGTRACE /tmp/trace_linux.txt || true
          echo "--- 7015 fork frames (step 30919, depth-2 levelgen) ---"
          mkdir -p /tmp/frame_linux
          NLE_REPLAY_KEEP_GOING=1 NLE_REPLAY_DUMP_STEPS=30918,30919,30920 \
            NLE_REPLAY_DUMP_DIR=/tmp/frame_linux build/replay_golden \
            build/libnethack.so build/dat \
            tests/linuxgold/aa_seed7015_7015.golden \
            | grep -E "kg-mismatch|KEEP-GOING" | head -4 || true
          echo "--- repinned 7010: dump frames around the 11222 flicker ---"
          mkdir -p /tmp/frame_linux
          NLE_REPLAY_KEEP_GOING=1 NLE_REPLAY_DUMP_STEPS=11221,11222,11223 \
            NLE_REPLAY_DUMP_DIR=/tmp/frame_linux build/replay_golden \
            build/libnethack.so build/dat \
            tests/msan/aa_seed7010_repinned.golden \
            | grep -E "kg-mismatch|KEEP-GOING" || true
          echo "--- aa_7015: dump frames around the 5330 flicker ---"
          NLE_REPLAY_KEEP_GOING=1 NLE_REPLAY_DUMP_STEPS=5329,5330,5331,5332 \
            NLE_REPLAY_DUMP_DIR=/tmp/frame_linux build/replay_golden \
            build/libnethack.so build/dat \
            tests/goldens/aa_seed7015_7015.golden \
            | grep -E "kg-mismatch|KEEP-GOING" | head -8 || true

      - name: gcc -O3 Release build init check
        run: |
          # pip-installed stock (gcc Release/-O3) generates a DIFFERENT
          # level-1 gold position than every -O2/clang build for the same
          # seeds. If our engine at gcc -O3 reproduces that, the divergence
          # is optimization-level-dependent UB in level gen, not a
          # stock-vs-fork difference.
          cmake -S . -B build_o3 -DCMAKE_BUILD_TYPE=Release
          cmake --build build_o3 --target nethack -j "$(nproc)"
          echo "--- gcc -O3 vs Linux-recorded goldens (want: INIT match) ---"
          NLE_REPLAY_KEEP_GOING=1 build/replay_golden             build_o3/libnethack.so build/dat             tests/linuxgold/aa_seed7014_7014.golden 2>&1 | head -3
          echo "--- gcc -O3 vs mac-recorded golden (want: INIT mismatch) ---"
          NLE_REPLAY_KEEP_GOING=1 build/replay_golden             build_o3/libnethack.so build/dat             tests/goldens/aa_seed7014_7014.golden 2>&1 | head -3

      - name: Two-build agreement (gcc -O2 vs gcc -O3, sequenced engine)
        run: |
          # RNG-drawing call arguments are now explicitly sequenced, so the
          # game must be identical at any optimization level. Replay the
          # deep golden keep-going with both builds and diff the streams.
          cmake -S . -B build_o3s -DCMAKE_BUILD_TYPE=Release > /dev/null
          cmake --build build_o3s --target nethack -j "$(nproc)" > /dev/null 2>&1
          echo "--- FULL CORPUS vs Linux gcc -O3 engine ---"
          build/replay_golden build_o3s/libnethack.so build/dat \
            tests/goldens/*.golden | tail -1
          g=tests/goldens/aa_seed7010_7010.golden
          NLE_REPLAY_KEEP_GOING=1 build/replay_golden \
            build/libnethack.so build/dat $g > /tmp/o2.out 2>&1 || true
          NLE_REPLAY_KEEP_GOING=1 build/replay_golden \
            build_o3s/libnethack.so build/dat $g > /tmp/o3.out 2>&1 || true
          if diff /tmp/o2.out /tmp/o3.out; then
            echo "BUILDS AGREE over $(grep -oE '[0-9]+ steps' /tmp/o2.out)"
          else
            echo "BUILDS DIVERGE - more unsequenced sites remain"
          fi
          tail -2 /tmp/o2.out

      - name: UB flag bisect at gcc -O3
        run: |
          # gcc -O3 produces a different level-1 than -O2/clang (same
          # source, same seeds): flag-dependent UB. Find the UB class:
          # whichever defined-behavior flag restores the -O2 init (fe08...)
          # names it.
          for f in "-fwrapv" "-fno-strict-aliasing" "-fno-aggressive-loop-optimizations" "-fwrapv -fno-strict-aliasing"; do
            d="build_f$(echo $f | tr -dc a-z)"
            cmake -S . -B $d -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_C_FLAGS="$f" > /dev/null
            cmake --build $d --target nethack -j "$(nproc)" > /dev/null 2>&1
            r=$(build/replay_golden $d/libnethack.so build/dat \
              tests/goldens/aa_seed7014_7014.golden 2>&1 | head -1)
            echo "flags [$f]: $r"
          done

      - name: Time sweep - prove divergence tracks ubirthday/257
        run: |
          # shknam.c derives shopkeeper names from
          #   nseed = ubirthday / 257;  name_wanted += nseed%13 - nseed%5
          # ubirthday = wall-clock time() at reset. The (nseed%13, nseed%5)
          # pair has period 65 in nseed, so 65 consecutive 257s buckets
          # cover every possible behavior. The harness interposes time()
          # (NLE_FAKE_TIME + -rdynamic); if some bucket reproduces the
          # golden's exact hash at every divergent step, the root cause is
          # proven and record-time is recovered modulo the bucket period.
          clang -O2 -g -rdynamic -Iinclude \
            -Ibuild/_deps/deboost_context-src/include \
            tests/replay_golden.c -ldl -o build/replay_faketime
          g=tests/msan/aa_seed7010_7010.golden
          base=1751500000
          for k in $(seq 0 64); do
            t=$((base + k * 257))
            got=$(NLE_FAKE_TIME=$t NLE_REPLAY_KEEP_GOING=1 \
              build/replay_faketime build/libnethack.so build/dat $g \
              | grep -cE "kg-mismatch step (54957|55270|55354|56860|57501)" \
              || true)
            echo "bucket k=$k epoch=$t shop-step mismatches=$got"
          done | tee /tmp/time_sweep.txt
          echo "=== buckets with zero shop-step mismatches (record-time bucket) ==="
          grep "mismatches=0" /tmp/time_sweep.txt || echo "none found"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: aslr-probe-logs
          path: |
            /tmp/time_sweep.txt
            /tmp/trace_linux.txt
            /tmp/frame_linux/
